      - 8.2 基本计数原理: part-ii/ch08-combinatorics/02-basic-counting-principles.md
      - 8.3 计数论证: part-ii/ch08-combinatorics/03-counting-arguments.md
      - 8.4 双向计数: part-ii/ch08-combinatorics/04-counting-in-two-ways.md
      - 8.5 可重组合: part-ii/ch08-combinatorics/05-selections-with-repetition.md
      - 8.6 鸽巢原理: part-ii/ch08-combinatorics/06-pigeonhole-principle.md
      - 8.7 容斥原理: part-ii/ch08-combinatorics/07-inclusion-exclusion.md
    - Ch9 定义与定理:
      - part-ii/ch09-definitions-theorems/index.md
      - 9.1 集合: part-ii/ch09-definitions-theorems/01-sets.md
      - 9.2 逻辑: part-ii/ch09-definitions-theorems/02-logic.md
      - 9.3 归纳法: part-ii/ch09-definitions-theorems/03-induction.md
      - 9.4 关系: part-ii/ch09-definitions-theorems/04-relations.md
      - 9.5 函数: part-ii/ch09-definitions-theorems/05-functions.md
