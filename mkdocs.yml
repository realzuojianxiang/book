site_name: Everything You Always Wanted To Know About Mathematics
site_description: "双语对照阅读 | A Bilingual Reading Guide to Abstract Mathematics & Proof Writing"
site_author: "Brendan W. Sullivan (Author) | Community Translation"
site_url: https://eyawkmath.github.io

repo_name: eyawkmath/book
repo_url: https://github.com/eyawkmath/book
edit_uri: edit/main/docs/

copyright: "Copyright &copy; 2013 Brendan W. Sullivan &mdash; Translation contributions by the community"

theme:
  name: material
  custom_dir: overrides
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - toc.follow
    - content.tooltips
    - content.code.copy
    - header.autohide
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Noto Sans SC, Noto Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/css/bilingual.css
  - assets/css/math.css

extra_javascript:
  - assets/js/reading-progress.js
  - assets/js/bilingual-toggle.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search:
      lang:
        - en
        - zh
  - minify:
      minify_html: true
      minify_js: true
      htmlmin_opts:
        remove_comments: true
  - tags

nav:
  - 首页: index.md
  - Part I - 学会数学思考:
    - part-i/index.md
    - Ch1 什么是数学:
      - part-i/ch01-what-is-mathematics/index.md
      - 1.1 真理与证明: part-i/ch01-what-is-mathematics/01-truths-and-proofs.md
      - 1.2 表述展览: part-i/ch01-what-is-mathematics/02-exposition-exhibition.md
      - 1.3 复习与更新: part-i/ch01-what-is-mathematics/03-review-redo-renew.md
      - 1.4 趣味谜题: part-i/ch01-what-is-mathematics/04-quizzical-puzzicles.md
      - 1.5 练习: part-i/ch01-what-is-mathematics/05-its-wise-to-exercise.md
      - 1.6 展望: part-i/ch01-what-is-mathematics/06-lookahead.md
    - Ch2 数学归纳法:
      - part-i/ch02-mathematical-induction/index.md
      - 2.1 引言: part-i/ch02-mathematical-induction/01-introduction.md
      - 2.2 示例与讨论: part-i/ch02-mathematical-induction/02-examples-and-discussion.md
      - 2.3 定义归纳法: part-i/ch02-mathematical-induction/03-defining-induction.md
      - 2.4 更多示例: part-i/ch02-mathematical-induction/04-two-more-examples.md
      - 2.5 应用: part-i/ch02-mathematical-induction/05-applications.md
      - 2.6 小结: part-i/ch02-mathematical-induction/06-summary.md
    - Ch3 集合:
      - part-i/ch03-sets/index.md
      - 3.1 引言: part-i/ch03-sets/01-introduction.md
      - 3.2 集合的概念: part-i/ch03-sets/02-the-idea-of-a-set.md
      - 3.3 定义与示例: part-i/ch03-sets/03-definition-and-examples.md
      - 3.4 子集: part-i/ch03-sets/04-subsets.md
      - 3.5 集合运算: part-i/ch03-sets/05-set-operations.md
      - 3.6 指标集: part-i/ch03-sets/06-indexed-sets.md
      - 3.7 笛卡尔积: part-i/ch03-sets/07-cartesian-products.md
      - 3.8 定义自然数: part-i/ch03-sets/08-defining-natural-numbers.md
      - 3.9 集合证明: part-i/ch03-sets/09-proofs-involving-sets.md
    - Ch4 逻辑:
      - part-i/ch04-logic/index.md
      - 4.1 引言: part-i/ch04-logic/01-introduction.md
      - 4.2 数学命题: part-i/ch04-logic/02-mathematical-statements.md
      - 4.3 量词: part-i/ch04-logic/03-quantifiers.md
      - 4.4 逻辑否定: part-i/ch04-logic/04-logical-negation.md
      - 4.5 逻辑联结词: part-i/ch04-logic/05-logical-connectives.md
      - 4.6 逻辑等价: part-i/ch04-logic/06-logical-equivalence.md
      - 4.7 否定任意命题: part-i/ch04-logic/07-negation-of-any-statement.md
      - 4.8 真值与集合: part-i/ch04-logic/08-truth-values-and-sets.md
      - 4.9 证明写作: part-i/ch04-logic/09-writing-proofs.md
    - Ch5 严格归纳法:
      - part-i/ch05-rigorous-induction/index.md
      - 5.1 引言: part-i/ch05-rigorous-induction/01-introduction.md
      - 5.2 常规归纳法: part-i/ch05-rigorous-induction/02-regular-induction.md
      - 5.3 归纳法变体: part-i/ch05-rigorous-induction/03-other-variants.md
      - 5.4 强归纳法: part-i/ch05-rigorous-induction/04-strong-induction.md
      - 5.5 强归纳法变体: part-i/ch05-rigorous-induction/05-variants-of-strong-induction.md
  - Part II - 学习数学主题:
    - part-ii/index.md
    - Ch6 关系与模运算:
      - part-ii/ch06-relations-modular-arithmetic/index.md
      - 6.1 引言: part-ii/ch06-relations-modular-arithmetic/01-introduction.md
      - 6.2 抽象关系: part-ii/ch06-relations-modular-arithmetic/02-abstract-relations.md
      - 6.3 序关系: part-ii/ch06-relations-modular-arithmetic/03-order-relations.md
      - 6.4 等价关系: part-ii/ch06-relations-modular-arithmetic/04-equivalence-relations.md
      - 6.5 模运算: part-ii/ch06-relations-modular-arithmetic/05-modular-arithmetic.md
    - Ch7 函数与基数:
